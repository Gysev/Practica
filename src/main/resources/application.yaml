spring:
  application:
    name: course-management
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  servlet:
    multipart:
      max-file-size: ${MULTIPART_MAX_FILE_SIZE:64MB}
      max-request-size: ${MULTIPART_MAX_REQUEST_SIZE:65MB}
  jpa:
    open-in-view: false
    show-sql: true
    hibernate:
      ddl-auto: update
  thymeleaf:
    cache: false

jwt:
  issuer: ${JWT_ISSUER:practica}
  access-ttl: ${JWT_ACCESS_TTL:15m}
  refresh-ttl: ${JWT_REFRESH_TTL:168h}
  secret: ${JWT_SECRET:dev-secret-must-be-at-least-256-bits-long-for-hs256-algo!!!}

license:
  ticket-lifetime: ${LICENSE_TICKET_TTL:5m}
  signing:
    generate-dev-key: ${LICENSE_SIGN_DEV_KEY:true}
    keystore-location: ${LICENSE_KEYSTORE_LOCATION:}
    keystore-password: ${LICENSE_KEYSTORE_PASSWORD:}
    key-alias: ${LICENSE_KEY_ALIAS:license}

management:
  endpoints:
    web:
      exposure:
        include: "*"

server:
  error:
    include-stacktrace: on_param

app:
  plugin:
    url: ${APP_PLUGIN_URL:}
  seed-demo-users: ${APP_SEED_DEMO_USERS:true}

signature:
  minio:
    enabled: ${SIGNATURE_MINIO_ENABLED:false}
    endpoint: ${MINIO_ENDPOINT:http://127.0.0.1:9000}
    region: ${MINIO_REGION:us-east-1}
    access-key: ${MINIO_ACCESS_KEY:}
    secret-key: ${MINIO_SECRET_KEY:}
    bucket: ${MINIO_BUCKET:antivirus-signature-files}
    presign-ttl: ${MINIO_PRESIGN_TTL:15m}

---
spring:
  config:
    activate:
      on-profile: dev
  h2:
    console:
      enabled: true
      path: /h2-console
      settings:
        web-allow-others: false
  datasource:
    url: jdbc:h2:mem:courseapp;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password: ""
    driver-class-name: org.h2.Driver

---
spring:
  config:
    activate:
      on-profile: postgres
  h2:
    console:
      enabled: false
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: org.postgresql.Driver

app:
  seed-demo-users: ${APP_SEED_DEMO_USERS:false}

---
spring:
  config:
    activate:
      on-profile: ssl
server:
  ssl:
    enabled: true
    key-store: ${SSL_KEYSTORE_PATH}
    key-store-password: ${SSL_KEYSTORE_PASSWORD}
    key-store-type: ${SSL_KEYSTORE_TYPE:PKCS12}
