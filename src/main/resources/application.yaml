spring:
  application:
    name: course-management
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  jpa:
    open-in-view: false
    show-sql: true
    hibernate:
      ddl-auto: update
  thymeleaf:
    cache: false

jwt:
  issuer: ${JWT_ISSUER:practica}
  access-ttl: ${JWT_ACCESS_TTL:15m}
  refresh-ttl: ${JWT_REFRESH_TTL:168h}
  secret: ${JWT_SECRET:dev-secret-must-be-at-least-256-bits-long-for-hs256-algo!!!}

management:
  endpoints:
    web:
      exposure:
        include: "*"

server:
  error:
    include-stacktrace: on_param

app:
  plugin:
    url: ${APP_PLUGIN_URL:}
  seed-demo-users: ${APP_SEED_DEMO_USERS:true}

---
spring:
  config:
    activate:
      on-profile: dev
  h2:
    console:
      enabled: true
      path: /h2-console
      settings:
        web-allow-others: false
  datasource:
    url: jdbc:h2:mem:courseapp;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password: ""
    driver-class-name: org.h2.Driver

---
spring:
  config:
    activate:
      on-profile: postgres
  h2:
    console:
      enabled: false
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: org.postgresql.Driver

app:
  seed-demo-users: ${APP_SEED_DEMO_USERS:false}

---
spring:
  config:
    activate:
      on-profile: ssl
server:
  ssl:
    enabled: true
    key-store: ${SSL_KEYSTORE_PATH}
    key-store-password: ${SSL_KEYSTORE_PASSWORD}
    key-store-type: ${SSL_KEYSTORE_TYPE:PKCS12}
