name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: maven

      # Условия if: не могут использовать secrets.* — см. ошибку "Unrecognized named-value: secrets".
      # PKCS#12: secrets LICENSE_KEYSTORE_B64 и LICENSE_KEYSTORE_PASSWORD (название B64 — буква B, от Base64).
      - name: Build and test
        env:
          LICENSE_KEYSTORE_B64: ${{ secrets.LICENSE_KEYSTORE_B64 }}
          LICENSE_KEYSTORE_PASSWORD: ${{ secrets.LICENSE_KEYSTORE_PASSWORD }}
        run: |
          set -euo pipefail
          chmod +x mvnw
          if [ -n "${LICENSE_KEYSTORE_B64:-}" ]; then
            tmp_keystore="${RUNNER_TEMP}/license-ci.p12"
            printf '%s' "$LICENSE_KEYSTORE_B64" | base64 --decode > "$tmp_keystore"
            chmod 600 "$tmp_keystore"
            if [ ! -s "$tmp_keystore" ]; then
              echo "Decoded LICENSE_KEYSTORE_B64 is empty — check secret (name: LICENSE_KEYSTORE_B64)." >&2
              exit 1
            fi
            export LICENSE_KEYSTORE_LOCATION="file:${tmp_keystore}"
            export LICENSE_SIGN_DEV_KEY=false
          fi
          ./mvnw -B verify
